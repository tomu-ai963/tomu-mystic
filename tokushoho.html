<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>特定商取引法に基づく表記 — とむMYSTIC</title>
<link rel="stylesheet" href="mystic.css"/>
<style>
main {
  max-width: 760px;
  margin: 3rem auto;
  padding: 0 1.5rem 5rem;
  position: relative;
  z-index: 1;
}
h1 {
  font-size: 1.5rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 2.5rem;
  font-size: 0.9rem;
}
th, td {
  padding: 1rem 1.2rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
th {
  width: 35%;
  background: var(--surface);
  color: var(--muted);
  font-weight: 400;
  white-space: nowrap;
}
td { background: var(--card); color: var(--text); }
.price-list { margin: 0; padding: 0; list-style: none; }
.price-list li { padding: 0.25rem 0; }
.price-label {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.72rem;
  padding: 0.1rem 0.5rem;
  border-radius: 3px;
  margin-right: 0.5rem;
  letter-spacing: 0.04em;
}
.back-link {
  display: inline-block;
  margin-top: 1rem;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.back-link:hover { border-color: var(--accent); }
footer.legal-footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}
</style>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="index.html" class="logo">✦ とむMYSTIC</a>
</header>
<main>
  <h1>✦ 特定商取引法に基づく表記</h1>
  <table>
    <tr>
      <th>運営者・運営責任者</th>
      <td>[藤山　博史]</td>
    </tr>
    <tr>
      <th>所在地・電話番号</th>
      <td>請求があった場合には速やかに開示いたします</td>
    </tr>
    <tr>
      <th>メールアドレス</th>
      <td>Inverted.triangle.leef@gmail.com</td>
    </tr>
    <tr>
      <th>販売価格</th>
      <td>
        <ul class="price-list">
          <li><span class="price-label">MYSTIC</span>月額 780円（税込）</li>
        </ul>
      </td>
    </tr>
    <tr>
      <th>支払方法</th>
      <td>クレジットカード（Stripe決済）</td>
    </tr>
    <tr>
      <th>サービス提供時期</th>
      <td>決済完了後即時</td>
    </tr>
    <tr>
      <th>返金・キャンセル</th>
      <td>月途中のキャンセルによる返金は行いません</td>
    </tr>
  </table>
  <a href="index.html" class="back-link">← トップページに戻る</a>
</main>
<footer class="legal-footer">© 2026 とむMYSTIC. All rights reserved.</footer>
</body>
</html>
