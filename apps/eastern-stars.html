<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>東洋星座×干支診断 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🐉</span>
    <h1 class="app-title">東洋星座×干支診断</h1>
    <p class="app-desc">干支と東洋星座が織りなす宿命の交差点を読み解きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>生年月日</label>
      <input type="date" id="birthdate"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">東洋の星を読み解く</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 東洋占星術のメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getEto(b){const y=parseInt(b.split('-')[0]);const junishi=['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'];const jikkan=['庚','辛','壬','癸','甲','乙','丙','丁','戊','己'];return{kan:jikkan[y%10],eto:junishi[y%12]};}
function getNineStarKi(b){const[y,m,d]=b.split('-').map(Number);const ay=(m===1||(m===2&&d<=3))?y-1:y;let s=String(ay).split('').reduce((a,c)=>a+parseInt(c),0);while(s>=10)s=String(s).split('').reduce((a,c)=>a+parseInt(c),0);const n=(11-s)%9||9;const names=['','一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星','九紫火星'];return{num:n,name:names[n]};}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const v=document.getElementById("birthdate").value;
  if(!v){alert("生年月日を入力してください");return;}
  const eto=getEto(v);
  const ki=getNineStarKi(v);
  const etoStr=`${eto.kan}${eto.eto}`;
  const cd=document.getElementById("calc-display");
  cd.textContent=`干支：${etoStr}年 ／ 本命星：${ki.name}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="干支を読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/eastern-stars",{birthdate:v,eto:etoStr,honmeisei:ki.name});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="東洋の星を読み解く";}
});
</script>
</body>
</html>
