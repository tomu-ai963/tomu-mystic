<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ホロスコープ詳細 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ <span>Mystic</span> System</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🔭</span>
    <h1 class="app-title">ホロスコープ詳細</h1>
    <p class="app-desc">太陽・月・アセンダントの三位一体があなたの魂の設計図を描きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>生年月日</label>
      <input type="date" id="birthdate"/>
    </div>
    <div class="field-group">
      <label>出生時刻（わからない場合は12:00）</label>
      <input type="time" id="birth-time" value="12:00"/>
    </div>
    <div class="field-group">
      <label>出生地（市区町村）</label>
      <input type="text" id="birth-place" placeholder="例：東京都渋谷区"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">ホロスコープを読み解く</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ ホロスコープ鑑定</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getSunSign(b){const[,m,d]=b.split('-').map(Number);if((m===3&&d>=21)||(m===4&&d<=19))return'牡羊座';if((m===4&&d>=20)||(m===5&&d<=20))return'牡牛座';if((m===5&&d>=21)||(m===6&&d<=21))return'双子座';if((m===6&&d>=22)||(m===7&&d<=22))return'蟹座';if((m===7&&d>=23)||(m===8&&d<=22))return'獅子座';if((m===8&&d>=23)||(m===9&&d<=22))return'乙女座';if((m===9&&d>=23)||(m===10&&d<=23))return'天秤座';if((m===10&&d>=24)||(m===11&&d<=22))return'蠍座';if((m===11&&d>=23)||(m===12&&d<=21))return'射手座';if((m===12&&d>=22)||(m===1&&d<=19))return'山羊座';if((m===1&&d>=20)||(m===2&&d<=18))return'水瓶座';return'魚座';}
// 月星座を確定計算（基準：2000-01-01 月の黄道経度≈218.32°、平均移動速度13.1764°/日）
function getMoonSign(b){
  const ref=Date.UTC(2000,0,1);
  const[y,m,d]=b.split('-').map(Number);
  const diff=(Date.UTC(y,m-1,d)-ref)/86400000;
  const lon=((218.32+diff*13.1764)%360+360)%360;
  const signs=['牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座','天秤座','蠍座','射手座','山羊座','水瓶座','魚座'];
  return signs[Math.floor(lon/30)];
}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const birthdate=document.getElementById("birthdate").value;
  const birthTime=document.getElementById("birth-time").value;
  const birthPlace=document.getElementById("birth-place").value.trim();
  if(!birthdate||!birthPlace){alert("生年月日と出生地を入力してください");return;}
  const sign=getSunSign(birthdate);
  const moonSign=getMoonSign(birthdate);
  const cd=document.getElementById("calc-display");
  cd.textContent=`太陽星座：${sign} ／ 月星座：${moonSign}（生年月日ベース簡易算出）`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="天体の配置を読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/horoscope-deep",{birthdate,birthTime,birthPlace,zodiacSign:sign,moonSign});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="ホロスコープを読み解く";}
});
</script>
</body>
</html>
