<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>オラクルカード — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🌸</span>
    <h1 class="app-title">オラクルカード</h1>
    <p class="app-desc">テーマを選び、宇宙からのメッセージカードを引きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>テーマを選んでください</label>
      <div class="options-grid" id="theme-grid"></div>
    </div>
    <div class="field-group" style="margin-top:1rem">
      <label>カードを直感で選んでください</label>
      <div class="symbol-grid" id="card-grid"></div>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">オラクルのメッセージを受け取る</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 宇宙からのメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

const THEMES=["愛と関係","仕事と使命","お金と豊かさ","健康と癒し","スピリチュアル成長","人生の転機","創造性","未来の方向性"];
const CARDS_LIST=[
  ["🌟","光の扉"],["🌙","月の抱擁"],["🔥","炎の意志"],["💧","水の恵み"],["🌿","大地の力"],
  ["🦋","変容"],["🌈","虹の橋"],["⭐","新しい星"],["🕊️","平和"],["🌺","開花"],
  ["🌊","流れ"],["🏔️","頂上"],["🌙","満月"],["☀️","太陽"],["🌙","新月"],["⚡","閃光"]
];

let selTheme=null,selCard=null;

const tg=document.getElementById("theme-grid");
THEMES.forEach(t=>{
  const btn=document.createElement("button");
  btn.className="opt-btn";btn.textContent=t;
  btn.addEventListener("click",()=>{
    tg.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");selTheme=t;
  });
  tg.appendChild(btn);
});

const cg=document.getElementById("card-grid");
CARDS_LIST.forEach(([icon,name])=>{
  const btn=document.createElement("button");
  btn.className="symbol-btn";
  btn.innerHTML=`<span class="symbol-glyph">${icon}</span>${name}`;
  btn.addEventListener("click",()=>{
    cg.querySelectorAll(".symbol-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");selCard=name;
  });
  cg.appendChild(btn);
});

document.getElementById("submit-btn").addEventListener("click",async()=>{
  if(!selTheme||!selCard){alert("テーマとカードを選んでください");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`テーマ：${selTheme} ／ カード：${selCard}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="メッセージを受信中...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/oracle-cards",{theme:selTheme,card:selCard});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="オラクルのメッセージを受け取る";}
});
</script>
</body>
</html>
