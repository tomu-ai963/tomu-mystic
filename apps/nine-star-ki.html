<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>九星気学診断 — とむMYSTIC</title>
<link rel="manifest" href="nine-star-ki-manifest.json">
<meta name="theme-color" content="#9b59b6">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">☯️</span>
    <h1 class="app-title">九星気学診断</h1>
    <p class="app-desc">一白水星〜九紫火星、あなたの本命星が運命を語ります</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>生年月日</label>
      <input type="date" id="birthdate"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">本命星を鑑定する</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 九星気学のメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getNineStarKi(b){const[y,m,d]=b.split('-').map(Number);const ay=(m===1||(m===2&&d<=3))?y-1:y;let s=String(ay).split('').reduce((a,c)=>a+parseInt(c),0);while(s>=10)s=String(s).split('').reduce((a,c)=>a+parseInt(c),0);const n=(11-s)%9||9;const names=['','一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星','九紫火星'];return{num:n,name:names[n]};}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const v=document.getElementById("birthdate").value;
  if(!v){alert("生年月日を入力してください");return;}
  const ki=getNineStarKi(v);
  const cd=document.getElementById("calc-display");
  cd.textContent=`本命星：${ki.name}（${ki.num}）`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="気の流れを読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/nine-star-ki",{birthdate:v,honmeisei:ki.name,honmeiseiNum:ki.num});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="本命星を鑑定する";}
});
</script>
</body>
</html>
