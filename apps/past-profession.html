<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>前世の職業診断 — とむMYSTIC</title>
<link rel="manifest" href="past-profession-manifest.json">
<meta name="theme-color" content="#9b59b6">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="../mystic.css"/>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">⚔️</span>
    <h1 class="app-title">前世の職業診断</h1>
    <p class="app-desc">過去世であなたが担っていた役割と使命を明かします</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>最も自然に引き寄せられる活動は？</label>
      <div class="options-grid" id="q1-grid"></div>
    </div>
    <div class="field-group">
      <label>過去世で持っていたと感じるスキルや知識は？</label>
      <input type="text" id="q2" placeholder="例：薬草の知識、剣術、星の読み方..."/>
    </div>
    <div class="field-group">
      <label>仕事に関して感じる強い直感や使命感は？</label>
      <input type="text" id="q3" placeholder="例：人を守りたい、真実を伝えたい..."/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">前世の職業を読み解く</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 前世の職業と魂の記憶</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

const OPTS=["人を癒す・助ける","知識を伝える・教える","守る・戦う","創造する・作る","儀式・祈り・繋ぐ","探求する・旅をする"];
let selQ1=null;
const g=document.getElementById("q1-grid");
OPTS.forEach(o=>{
  const btn=document.createElement("button");
  btn.className="opt-btn";btn.textContent=o;
  btn.addEventListener("click",()=>{
    g.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");selQ1=o;
  });
  g.appendChild(btn);
});

document.getElementById("submit-btn").addEventListener("click",async()=>{
  const q2=document.getElementById("q2").value.trim();
  const q3=document.getElementById("q3").value.trim();
  if(!selQ1){alert("最初の質問に答えてください");return;}
  const cd=document.getElementById("calc-display");
  const lines=[`傾向：${selQ1}`];
  if(q2)lines.push(`スキル：${q2}`);
  if(q3)lines.push(`使命感：${q3}`);
  cd.textContent=lines.join(" ／ ");cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="魂の記録を調べています...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/past-profession",{answers:{q1:selQ1,q2,q3}});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="前世の職業を読み解く";}
});
</script>
</body>
</html>
