<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>魂の使命診断 — とむMYSTIC</title>
<link rel="manifest" href="soul-mission-manifest.json">
<meta name="theme-color" content="#9b59b6">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="../mystic.css"/>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">💎</span>
    <h1 class="app-title">魂の使命診断</h1>
    <p class="app-desc">今世に生まれた目的と、魂が果たすべき使命を明かします</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>今世で最も大切にしていることは？</label>
      <div class="options-grid" id="q1-grid"></div>
    </div>
    <div class="field-group">
      <label>どんな時に「これが自分の使命だ」と感じますか？</label>
      <input type="text" id="q2" placeholder="例：誰かの笑顔を見た時、創造活動に集中している時..."/>
    </div>
    <div class="field-group">
      <label>あなたが人に与えられる最大のギフトは？</label>
      <input type="text" id="q3" placeholder="例：安心感、新しい視点、癒し..."/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">魂の使命を解読する</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ あなたの魂の使命</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

const OPTS=["愛と繋がり","自由と冒険","知恵と真実","癒しと奉仕","創造と表現","変革とリーダーシップ"];
let selQ1=null;
const g=document.getElementById("q1-grid");
OPTS.forEach(o=>{
  const btn=document.createElement("button");
  btn.className="opt-btn";btn.textContent=o;
  btn.addEventListener("click",()=>{
    g.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");selQ1=o;
  });
  g.appendChild(btn);
});

document.getElementById("submit-btn").addEventListener("click",async()=>{
  const q2=document.getElementById("q2").value.trim();
  const q3=document.getElementById("q3").value.trim();
  if(!selQ1){alert("最初の質問に答えてください");return;}
  const cd=document.getElementById("calc-display");
  const lines=[`価値観：${selQ1}`];
  if(q2)lines.push(`使命感：${q2}`);
  if(q3)lines.push(`ギフト：${q3}`);
  cd.textContent=lines.join(" ／ ");cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="魂の設計図を読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/soul-mission",{answers:{q1:selQ1,q2,q3}});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="魂の使命を解読する";}
});
</script>
</body>
</html>
