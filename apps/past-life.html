<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>前世診断 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🕯️</span>
    <h1 class="app-title">前世診断</h1>
    <p class="app-desc">魂が歩んできた過去世の物語を読み解きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>直感的に惹かれる時代・場所は？</label>
      <input type="text" id="q1" placeholder="例：古代エジプト、中世ヨーロッパ、平安時代..."/>
    </div>
    <div class="field-group">
      <label>繰り返し見る夢や映像があれば</label>
      <input type="text" id="q2" placeholder="例：砂漠、大きな宮殿、海辺の村..."/>
    </div>
    <div class="field-group">
      <label>説明できない得意なことや強い感情は？</label>
      <input type="text" id="q3" placeholder="例：水への恐れ、音楽への強い親しみ..."/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">前世の扉を開く</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 前世の記憶</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const q1=document.getElementById("q1").value.trim();
  const q2=document.getElementById("q2").value.trim();
  const q3=document.getElementById("q3").value.trim();
  if(!q1){alert("最初の質問に答えてください");return;}
  const cd=document.getElementById("calc-display");
  const lines=[`惹かれる時代：${q1}`];
  if(q2)lines.push(`繰り返す夢：${q2}`);
  if(q3)lines.push(`説明できない感情：${q3}`);
  cd.textContent=lines.join(" ／ ");cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="魂の記憶を読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/past-life",{answers:{q1,q2,q3}});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="前世の扉を開く";}
});
</script>
</body>
</html>
