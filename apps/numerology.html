<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>数秘術診断 — とむMYSTIC</title>
<link rel="manifest" href="numerology-manifest.json">
<meta name="theme-color" content="#9b59b6">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🔢</span>
    <h1 class="app-title">数秘術診断</h1>
    <p class="app-desc">名前と生年月日から魂のライフパスナンバーを読み解きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>お名前（読み仮名）</label>
      <input type="text" id="name" placeholder="例：やまだはなこ"/>
    </div>
    <div class="field-group">
      <label>生年月日</label>
      <input type="date" id="birthdate"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">数の秘密を解読する</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 魂のナンバーメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getLifePathNumber(b){let n=b.replace(/-/g,'').split('').reduce((a,c)=>a+parseInt(c),0);while(n>9&&n!==11&&n!==22&&n!==33)n=String(n).split('').reduce((a,c)=>a+parseInt(c),0);return n;}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const name=document.getElementById("name").value.trim();
  const birthdate=document.getElementById("birthdate").value;
  if(!name||!birthdate){alert("お名前と生年月日を入力してください");return;}
  const lpn=getLifePathNumber(birthdate);
  const cd=document.getElementById("calc-display");
  cd.textContent=`ライフパスナンバー：${lpn}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="数字を解析中...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/numerology",{name,birthdate,lifePathNumber:lpn});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="数の秘密を解読する";}
});
</script>
</body>
</html>
