<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>縁結び相性診断 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">💫</span>
    <h1 class="app-title">縁結び相性診断</h1>
    <p class="app-desc">2つの魂の縁と、共に歩む意味を宇宙の視点から読み解きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>あなたの生年月日</label>
      <input type="date" id="birthdate1"/>
    </div>
    <div class="field-group">
      <label>相手の生年月日</label>
      <input type="date" id="birthdate2"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.7;"></div>
    <button class="submit-btn" id="submit-btn">魂の縁を読む</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 2つの魂の縁</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getSunSign(b){const[,m,d]=b.split('-').map(Number);if((m===3&&d>=21)||(m===4&&d<=19))return'牡羊座';if((m===4&&d>=20)||(m===5&&d<=20))return'牡牛座';if((m===5&&d>=21)||(m===6&&d<=21))return'双子座';if((m===6&&d>=22)||(m===7&&d<=22))return'蟹座';if((m===7&&d>=23)||(m===8&&d<=22))return'獅子座';if((m===8&&d>=23)||(m===9&&d<=22))return'乙女座';if((m===9&&d>=23)||(m===10&&d<=23))return'天秤座';if((m===10&&d>=24)||(m===11&&d<=22))return'蠍座';if((m===11&&d>=23)||(m===12&&d<=21))return'射手座';if((m===12&&d>=22)||(m===1&&d<=19))return'山羊座';if((m===1&&d>=20)||(m===2&&d<=18))return'水瓶座';return'魚座';}
function getLifePathNumber(b){let n=b.replace(/-/g,'').split('').reduce((a,c)=>a+parseInt(c),0);while(n>9&&n!==11&&n!==22&&n!==33)n=String(n).split('').reduce((a,c)=>a+parseInt(c),0);return n;}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const b1=document.getElementById("birthdate1").value;
  const b2=document.getElementById("birthdate2").value;
  if(!b1||!b2){alert("2人の生年月日を入力してください");return;}
  const s1=getSunSign(b1),l1=getLifePathNumber(b1);
  const s2=getSunSign(b2),l2=getLifePathNumber(b2);
  const cd=document.getElementById("calc-display");
  cd.innerHTML=`あなた：${s1}・LPN${l1}<br>相手：${s2}・LPN${l2}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="魂の縁を読んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/soul-compatibility",{birthdate1:b1,birthdate2:b2,sign1:s1,lpn1:l1,sign2:s2,lpn2:l2});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="魂の縁を読む";}
});
</script>
</body>
</html>
