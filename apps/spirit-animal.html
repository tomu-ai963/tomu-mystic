<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>精霊動物診断 — とむMYSTIC</title>
<link rel="manifest" href="spirit-animal-manifest.json">
<meta name="theme-color" content="#9b59b6">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<link rel="stylesheet" href="../mystic.css"/>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🦋</span>
    <h1 class="app-title">精霊動物診断</h1>
    <p class="app-desc">あなたを守護する精霊動物が魂のメッセージを届けます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>最も惹かれる自然環境は？</label>
      <div class="options-grid" id="q1-grid"></div>
    </div>
    <div class="field-group">
      <label>あなたの一番の強みは？</label>
      <div class="options-grid" id="q2-grid"></div>
    </div>
    <div class="field-group">
      <label>困難に直面した時、あなたは？</label>
      <div class="options-grid" id="q3-grid"></div>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">守護精霊動物を探す</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 精霊動物からのメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

function makeOpts(gridId,opts,cb){
  const g=document.getElementById(gridId);
  opts.forEach(o=>{
    const btn=document.createElement("button");
    btn.className="opt-btn";btn.textContent=o;
    btn.addEventListener("click",()=>{
      g.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");cb(o);
    });
    g.appendChild(btn);
  });
}
let a1=null,a2=null,a3=null;
makeOpts("q1-grid",["深い森","広大な海","自由な空","広大な大地","高い山峰"],v=>a1=v);
makeOpts("q2-grid",["深い知恵と洞察","力強さと勇気","素早さと機転","深い愛と忠誠","癒しと共感"],v=>a2=v);
makeOpts("q3-grid",["静かに内省して答えを探す","仲間を呼んで力を合わせる","本能に従い行動する","流れに身を委ね変化を待つ","高い視点から全体を俯瞰する"],v=>a3=v);

document.getElementById("submit-btn").addEventListener("click",async()=>{
  if(!a1||!a2||!a3){alert("すべての質問に答えてください");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`自然：${a1} ／ 強み：${a2} ／ 困難時：${a3}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="精霊を呼んでいます...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/spirit-animal",{answers:{q1:a1,q2:a2,q3:a3}});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="守護精霊動物を探す";}
});
</script>
</body>
</html>
