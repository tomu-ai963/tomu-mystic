<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>姓名判断 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">✍️</span>
    <h1 class="app-title">姓名判断</h1>
    <p class="app-desc">漢字の名前に込められた五格の運命を読み解きます</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>氏名（漢字）</label>
      <input type="text" id="full-name" placeholder="例：山田 花子"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">名前の運命を鑑定する</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 五格鑑定結果</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>

容':10,'宮':10,'展':10,'恋':10,'悟':10,'振':10,'根':10,'格':10,'桂':10,'桃':10,'流':10,'浩':10,'浪':10,'浦':10,'特':10,'益':10,'神':10,'秦':10,'紘':10,'紗':10,'素':10,'能':10,'透':10,'泰':10,'泳':10,'夏':10,'晃':10,'洸':10,'竜':10,'将':10,'航':10,'凌':10,'隼':10,'朔':10,'梅':10,'捷':10,'倖':10,'恭':10,'時':10,'朗':10,'健':11,'唯':11,'凰':11,'啓':11,'問':11,'基':11,'堂':11,'堅':11,'悠':11,'梨':11,'梓':11,'清':11,'渉':11,'渓':11,'淳':11,'深':11,'理':11,'現':11,'紬':11,'脩':11,'彩':11,'黄':11,'鹿':11,'崇':11,'康':11,'陸':11,'麻':11,'渚':11,'野':11,'球':11,'帯':11,'副':11,'務':11,'動':11,'匡':11,'猛':11,'崚':11,'鳥':11,'彬':11,'惇':11,'琢':11,'朝':12,'博':12,'善':12,'尊':12,'幾':12,'敦':12,'最':12,'植':12,'湯':12,'無':12,'登':12,'絢':12,'絵':12,'結':12,'翔':12,'雄':12,'森':12,'湖':12,'満':12,'晴':12,'喜':12,'御':12,'勝':12,'葵':12,'琴':12,'稀':12,'葉':12,'椎':12,'陽':12,'裕':12,'智':12,'創':12,'統':12,'景':12,'晶':12,'達':12,'運':12,'策':12,'蒼':13,'遥':13,'蓮':13,'愛':13,'義':13,'想':13,'新':13,'業':13,'極':13,'楓':13,'歳':13,'滋':13,'照':13,'詩':13,'路':13,'聖':13,'頌':13,'暖':13,'椿':13,'楠':13,'豊':13,'誠':13,'源':13,'瑛':13,'静':14,'緑':14,'歌':14,'維':14,'徳':14,'漢':14,'端':14,'翠':14,'語':14,'誓':14,'銀':14,'関':14,'嘉':14,'聡':14,'彰':14,'豪':14,'颯':14,'碧':14,'輝':15,'熱':15,'確':15,'論':15,'穂':15,'璃':15,'凛':15,'凜':15,'樹':16,'橋':16,'整':16,'親':16,'頼':16,'龍':16,'賢':16,'謙':17,'霞':17,'鎌':18,'蘭':19,'鶴':21,'麟':23};
function calcGoKaku(fullName){
  const t=fullName.trim();
  const sp=t.search(/[\s　]/);
  let sei,mei;
  if(sp>0){sei=t.slice(0,sp).split('');mei=t.slice(sp+1).trim().split('');}
  else{const h=Math.ceil(t.length/2);sei=t.slice(0,h).split('');mei=t.slice(h).split('');}
  const s=c=>KS[c]??'?';
  const ss=sei.map(s),ms=mei.map(s);
  const ok=a=>a.every(v=>v!=='?');
  const sum=a=>a.reduce((x,b)=>x+(b==='?'?0:b),0);
  const tk=ok(ss)?sum(ss):'?';
  const ck=ok(ms)?sum(ms):'?';
  const jk=(ss[ss.length-1]!=='?'&&ms[0]!=='?')?ss[ss.length-1]+ms[0]:'?';
  const sk=(tk!=='?'&&ck!=='?')?tk+ck:'?';
  const gk=(sk!=='?'&&jk!=='?')?sk-jk:'?';
  return{sei:sei.join(''),mei:mei.join(''),ss,ms,tk,jk,ck,gk,sk,unknown:[...ss,...ms].some(v=>v==='?')};
}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const fullName=document.getElementById("full-name").value.trim();
  if(!fullName){alert("氏名を入力してください");return;}
  const g=calcGoKaku(fullName);
  const cd=document.getElementById("calc-display");
  // 各五格を個別に表示して「確定値」を明示
  cd.innerHTML=`【確定済み五格 — 再計算禁止】<br>`
    +`天格：${g.tk}　人格：${g.jk}　地格：${g.ck}　外格：${g.gk}　総格：${g.sk}`
    +(g.unknown?'<br><small>※未登録の漢字は「?」扱い</small>':'');
  cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="名前を鑑定中...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  // 各五格を個別フィールドで明示送信（workerが再計算せず使えるように）
  try{const d=await MysticAuth.callApi("/mystic/name-fortune",{
    fullName,
    tenkaku:g.tk, jinkaku:g.jk, chikaku:g.ck, sotokaku:g.gk, soukaku:g.sk,
    confirmedGoKaku:true
  });rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="名前の運命を鑑定する";}
});
</script>
</body>
</html>
