<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>パワーストーン診断 — とむMYSTIC</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ とむMYSTIC</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">💠</span>
    <h1 class="app-title">パワーストーン診断</h1>
    <p class="app-desc">今のあなたの状態に最も必要なクリスタルを特定します</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>今の状態・悩みを教えてください</label>
      <textarea id="current-state" placeholder="例：最近不安が続いています。人間関係に疲れていて、エネルギーが低い気がします。新しいことを始める勇気が欲しいです..."></textarea>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">守護の石を探す</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ あなたへのクリスタルメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const currentState=document.getElementById("current-state").value.trim();
  if(!currentState){alert("今の状態を入力してください");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`状態：${currentState.length>40?currentState.slice(0,40)+"…":currentState}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="石の声を聴いています...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/crystal-guide",{currentState});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="守護の石を探す";}
});
</script>
</body>
</html>
